<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ফ্রেশ আম বাজার</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f8f8f8;
}

header{
    background:#ffb300;
    color:white;
    text-align:center;
    padding:25px;
}

.hero{
    text-align:center;
    padding:20px;
}

.hero img{
    width:90%;
    max-width:600px;
    border-radius:15px;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    margin-bottom:20px;
}

.price{
    color:green;
    font-size:24px;
    font-weight:bold;
}

input, textarea{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    background:#28a745;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}

.whatsapp{
    display:inline-block;
    background:#25D366;
    color:white;
    padding:12px 20px;
    text-decoration:none;
    border-radius:8px;
    margin-top:10px;
}
</style>
</head>
<body>

<header>
    <h1>🥭 ফ্রেশ আম বাজার</h1>
    <p>বাগান থেকে সরাসরি আপনার ঘরে</p>
</header>

<section class="hero">
    <img src="https://images.unsplash.com/photo-1553279768-865429fa0078?w=1200" alt="Mango">
</section>

<div class="container">

    <div class="card">
        <h2>হারিভাঙ্গা আম</h2>
        <p>মিষ্টি, সুস্বাদু এবং সম্পূর্ণ প্রাকৃতিকভাবে পাকানো।</p>
        <p class="price">১২০ টাকা / কেজি</p>
    </div>

    <div class="card">
        <h2>অর্ডার ফর্ম</h2>

        <form>
            <input type="text" placeholder="আপনার নাম">
            <input type="tel" placeholder="মোবাইল নম্বর">
            <input type="text" placeholder="ঠিকানা">
            <input type="number" placeholder="কত কেজি আম লাগবে?">
            <textarea placeholder="অতিরিক্ত তথ্য"></textarea>

            <button type="submit">অর্ডার পাঠান</button>
        </form>

        <br>

        <a class="whatsapp"
           href="https://wa.me/8801789897434?text=আমি%20আম%20অর্ডার%20করতে%20চাই"
           target="_blank">
           WhatsApp-এ অর্ডার করুন
        </a>
    </div>

</div>

</body>
</html>
